<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRS Season Standings</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels"></script>
    <script src="script.js" defer></script>
</head>

<body>

    <h1>TRS Season Standings</h1>

    <canvas id="graficoCorrida"></canvas>

    <section class="driverStandings">
        <h2>Driver Standings</h2>

        <div class="sort-controls">
            <label>
                Sort drivers by:
                <select id="driverSortStat">
                    <option value="points">Points</option>
                    <option value="podiums">Podiums</option>
                    <option value="attendance">Attendance</option>
                    <option value="teamName">Team + Name</option>
                    <option value="driverName">Driver Name</option>
                </select>
            </label>

            <label>
                Order:
                <select id="driverSortOrder">
                    <option value="desc">Descending / (High-Low)</option>
                    <option value="asc">Ascending / (Low-High)</option>
                </select>
            </label>
        </div>

        <div class="drivers"></div>
    </section>


    <section class="constructorStandings">
        <h2>Constructor Standings</h2>
        <div class="teams"></div>
    </section>


    <section class="nextRaceSection">
        <h2>Next Race</h2>
        <div id="nextRace" class="nextRaceCard"></div>
    </section>

    <section class="racePodiums">
        <h2>Season Results</h2>

        <h3 class="half">First Half</h3>
        <div id="resultsFHalf" class="resultCards"></div>

        <h3 class="half">Second Half</h3>
        <div id="resultsSecHalf" class="resultCards"></div>

    </section>


    <section id="info"></section>
</body>
<footer>
    <div class="author">This website was made by: <a href="https://discordapp.com/users/550075922766757898" target="_blank">eveestreet</a> and Camilla Marianny </div>
</footer>

</html>
